name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Install dependencies
        run: npm install

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;26.1.10909125"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate app icons
        run: |
          pip install Pillow --quiet
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw, ImageFont
          import os

          sizes = {
            'android/app/src/main/res/mipmap-mdpi': 48,
            'android/app/src/main/res/mipmap-hdpi': 72,
            'android/app/src/main/res/mipmap-xhdpi': 96,
            'android/app/src/main/res/mipmap-xxhdpi': 144,
            'android/app/src/main/res/mipmap-xxxhdpi': 192,
          }

          for folder, size in sizes.items():
            os.makedirs(folder, exist_ok=True)
            img = Image.new('RGB', (size, size), color='#0a0a0a')
            draw = ImageDraw.Draw(img)
            margin = int(size * 0.08)
            draw.ellipse([margin, margin, size-margin, size-margin], fill='#e50914')
            try:
              font = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf', int(size * 0.55))
            except:
              font = ImageFont.load_default()
            text = 'Z'
            bbox = draw.textbbox((0, 0), text, font=font)
            tw, th = bbox[2]-bbox[0], bbox[3]-bbox[1]
            draw.text(((size-tw)//2 - bbox[0], (size-th)//2 - bbox[1]), text, fill='white', font=font)
            img.save(f'{folder}/ic_launcher.png')
            img_r = Image.new('RGBA', (size, size), (0,0,0,0))
            mask = Image.new('L', (size, size), 0)
            ImageDraw.Draw(mask).ellipse([0, 0, size, size], fill=255)
            img_r.paste(img, mask=mask)
            img_r.save(f'{folder}/ic_launcher_round.png')

          print("Icons created!")
          PYEOF

      - name: Generate Keystore
        run: |
          cd android/app
          keytool -genkeypair \
            -v \
            -keystore zovex-release.keystore \
            -alias zovex-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass zovex2026 \
            -keypass zovex2026 \
            -dname "CN=Zovex,OU=Mobile,O=Zovex,L=IL,ST=IL,C=IL"

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --no-configuration-cache --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zovex-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
