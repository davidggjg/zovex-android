name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Install dependencies
        run: npm install

      - name: Ensure gradle-plugin at top-level node_modules
        run: |
          PLUGIN_DIR="node_modules/@react-native/gradle-plugin"

          echo "=== @react-native scope ==="
          ls node_modules/@react-native/ 2>/dev/null || echo "(empty or missing)"

          echo "=== find gradle-plugin ==="
          find node_modules -path "*/@react-native/gradle-plugin" -type d 2>/dev/null | head -5

          if [ ! -d "$PLUGIN_DIR" ]; then
            NESTED=$(find node_modules -path "*/@react-native/gradle-plugin" -type d 2>/dev/null | head -1)
            if [ -n "$NESTED" ]; then
              mkdir -p node_modules/@react-native
              cp -r "$NESTED" node_modules/@react-native/gradle-plugin
              echo "Copied $NESTED -> $PLUGIN_DIR"
            else
              echo "ERROR: @react-native/gradle-plugin not found anywhere"
              exit 1
            fi
          fi

          echo "=== $PLUGIN_DIR top-level ==="
          ls -1 "$PLUGIN_DIR/" 2>/dev/null

          echo "=== build files ==="
          for f in build.gradle.kts build.gradle settings.gradle settings.gradle.kts; do
            [ -f "$PLUGIN_DIR/$f" ] && echo "FOUND: $f" || echo "MISSING: $f"
          done

          echo "=== build.gradle.kts ==="
          cat "$PLUGIN_DIR/build.gradle.kts" 2>/dev/null || echo "(not found)"

          echo "=== gradle/ dir ==="
          ls "$PLUGIN_DIR/gradle/" 2>/dev/null || echo "(no gradle/ dir)"

          echo "=== gradle/libs.versions.toml ==="
          cat "$PLUGIN_DIR/gradle/libs.versions.toml" 2>/dev/null || echo "(not found)"

          # Add settings.gradle if missing
          if [ ! -f "$PLUGIN_DIR/settings.gradle" ] && [ ! -f "$PLUGIN_DIR/settings.gradle.kts" ]; then
            echo "rootProject.name = 'react-native-gradle-plugin'" > "$PLUGIN_DIR/settings.gradle"
            echo "Created settings.gradle"
          fi

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;26.1.10909125"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate app icons
        run: |
          pip install Pillow --quiet
          python3 -c "
          from PIL import Image, ImageDraw
          import os
          if os.path.exists('assets/icon.png'):
              src = Image.open('assets/icon.png').convert('RGBA')
          else:
              src = Image.new('RGBA', (512, 512), (10, 10, 10, 255))
              draw = ImageDraw.Draw(src)
              draw.ellipse([80, 80, 432, 432], fill=(200, 0, 0, 255))
          sizes = {
              'android/app/src/main/res/mipmap-mdpi': 48,
              'android/app/src/main/res/mipmap-hdpi': 72,
              'android/app/src/main/res/mipmap-xhdpi': 96,
              'android/app/src/main/res/mipmap-xxhdpi': 144,
              'android/app/src/main/res/mipmap-xxxhdpi': 192,
          }
          for folder, size in sizes.items():
              os.makedirs(folder, exist_ok=True)
              icon = src.resize((size, size), Image.LANCZOS)
              bg = Image.new('RGBA', (size, size), (255, 255, 255, 255))
              bg.paste(icon, mask=icon.split()[3])
              bg.convert('RGB').save(f'{folder}/ic_launcher.png')
              circle_bg = Image.new('RGBA', (size, size), (255, 255, 255, 255))
              circle_bg.paste(icon, mask=icon.split()[3])
              mask = Image.new('L', (size, size), 0)
              ImageDraw.Draw(mask).ellipse([0, 0, size-1, size-1], fill=255)
              result = Image.new('RGBA', (size, size), (0, 0, 0, 0))
              result.paste(circle_bg, mask=mask)
              result.save(f'{folder}/ic_launcher_round.png')
          print('Icons created!')
          "

      - name: Restore Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/zovex-release.keystore

      - name: Register release SHA-1 with Firebase and fetch google-services.json
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SA_JSON }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          pip install google-auth --quiet
          python3 scripts/register_sha.py

      - name: Apply iOS OAuth client ID to source files
        run: |
          if [ -f ios_oauth.txt ]; then
            IOS_CLIENT_ID=$(sed -n '1p' ios_oauth.txt | tr -d '[:space:]')
            IOS_SCHEME=$(sed -n '2p' ios_oauth.txt | tr -d '[:space:]')
            echo "iOS CLIENT_ID: $IOS_CLIENT_ID"
            echo "iOS scheme:    $IOS_SCHEME"
            sed -i "s|IOS_CLIENT_ID_PLACEHOLDER|${IOS_CLIENT_ID}|g" src/App.js
            sed -i "s|IOS_SCHEME_PLACEHOLDER|${IOS_SCHEME}|g" android/app/src/main/AndroidManifest.xml
            echo "Applied iOS OAuth client ID to App.js and AndroidManifest.xml"
          else
            echo "WARNING: ios_oauth.txt not found — building with placeholder values (sign-in will not work)"
          fi

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --no-configuration-cache --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zovex-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
