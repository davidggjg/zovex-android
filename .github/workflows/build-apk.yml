name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Install dependencies
        run: npm install

      - name: Ensure gradle-plugin at top-level node_modules
        run: |
          PLUGIN_DIR="node_modules/@react-native/gradle-plugin"

          echo "=== @react-native scope ==="
          ls node_modules/@react-native/ 2>/dev/null || echo "(empty or missing)"

          echo "=== find gradle-plugin ==="
          find node_modules -path "*/@react-native/gradle-plugin" -type d 2>/dev/null | head -5

          if [ ! -d "$PLUGIN_DIR" ]; then
            NESTED=$(find node_modules -path "*/@react-native/gradle-plugin" -type d 2>/dev/null | head -1)
            if [ -n "$NESTED" ]; then
              mkdir -p node_modules/@react-native
              cp -r "$NESTED" node_modules/@react-native/gradle-plugin
              echo "Copied $NESTED → $PLUGIN_DIR"
            else
              echo "ERROR: @react-native/gradle-plugin not found anywhere"
              exit 1
            fi
          fi

          echo "=== $PLUGIN_DIR top-level ==="
          ls -1 "$PLUGIN_DIR/" 2>/dev/null

          echo "=== build files ==="
          for f in build.gradle.kts build.gradle settings.gradle settings.gradle.kts; do
            [ -f "$PLUGIN_DIR/$f" ] && echo "FOUND: $f" || echo "MISSING: $f"
          done

          echo "=== build.gradle.kts ==="
          cat "$PLUGIN_DIR/build.gradle.kts" 2>/dev/null || echo "(not found)"

          echo "=== gradle/ dir ==="
          ls "$PLUGIN_DIR/gradle/" 2>/dev/null || echo "(no gradle/ dir)"

          echo "=== gradle/libs.versions.toml ==="
          cat "$PLUGIN_DIR/gradle/libs.versions.toml" 2>/dev/null || echo "(not found)"

          # Add settings.gradle if missing
          if [ ! -f "$PLUGIN_DIR/settings.gradle" ] && [ ! -f "$PLUGIN_DIR/settings.gradle.kts" ]; then
            echo "rootProject.name = 'react-native-gradle-plugin'" > "$PLUGIN_DIR/settings.gradle"
            echo "Created settings.gradle"
          fi

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;26.1.10909125"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate app icons
        run: |
          pip install Pillow --quiet
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw
          import os

          src = Image.open('assets/icon.png').convert('RGBA')

          sizes = {
            'android/app/src/main/res/mipmap-mdpi': 48,
            'android/app/src/main/res/mipmap-hdpi': 72,
            'android/app/src/main/res/mipmap-xhdpi': 96,
            'android/app/src/main/res/mipmap-xxhdpi': 144,
            'android/app/src/main/res/mipmap-xxxhdpi': 192,
          }

          for folder, size in sizes.items():
            os.makedirs(folder, exist_ok=True)

            # Square icon — logo on white background
            icon = src.resize((size, size), Image.LANCZOS)
            bg = Image.new('RGBA', (size, size), (255, 255, 255, 255))
            bg.paste(icon, mask=icon.split()[3])
            bg.convert('RGB').save(f'{folder}/ic_launcher.png')

            # Round icon — logo cropped to circle
            circle_bg = Image.new('RGBA', (size, size), (255, 255, 255, 255))
            circle_bg.paste(icon, mask=icon.split()[3])
            mask = Image.new('L', (size, size), 0)
            ImageDraw.Draw(mask).ellipse([0, 0, size - 1, size - 1], fill=255)
            result = Image.new('RGBA', (size, size), (0, 0, 0, 0))
            result.paste(circle_bg, mask=mask)
            result.save(f'{folder}/ic_launcher_round.png')

          print("Icons created from logo!")
          PYEOF

      - name: Restore Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/zovex-release.keystore

      - name: Register release SHA-1 with Firebase and fetch updated google-services.json
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SA_JSON }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          pip install google-auth --quiet
          python3 << 'PYEOF'
import json, os, sys, base64, subprocess
import urllib.request, urllib.error

# --- Extract SHA-1 from release keystore ---
r = subprocess.run(
    ['keytool', '-list', '-v', '-keystore', 'android/app/zovex-release.keystore',
     '-alias', 'zovex-key', '-storepass', 'zovex2026'],
    capture_output=True, text=True
)
sha1 = None
for line in r.stdout.split('\n'):
    if 'SHA1:' in line:
        sha1 = line.split('SHA1:')[1].strip().replace(':', '').replace(' ', '')
        break

if not sha1 or len(sha1) != 40:
    print('Could not extract SHA-1 — using static google-services.json')
    b64 = os.environ.get('GOOGLE_SERVICES_JSON_BASE64', '')
    if b64:
        open('android/app/google-services.json', 'wb').write(base64.b64decode(b64))
    sys.exit(0)

print(f'Release SHA-1: {sha1}')

try:
    from google.oauth2 import service_account
    from google.auth.transport.requests import Request as GReq

    sa = json.loads(os.environ['FIREBASE_SA_JSON'])
    project_id = sa['project_id']
    creds = service_account.Credentials.from_service_account_info(
        sa, scopes=['https://www.googleapis.com/auth/firebase',
                    'https://www.googleapis.com/auth/cloud-platform'])
    creds.refresh(GReq())
    hdrs = {'Authorization': f'Bearer {creds.token}', 'Content-Type': 'application/json'}

    def api(url, data=None, method=None):
        req = urllib.request.Request(url, data=data, headers=hdrs,
                                     method=method or ('POST' if data else 'GET'))
        return json.loads(urllib.request.urlopen(req).read())

    # Find Android app ID for com.zovexapp
    apps = api(f'https://firebase.googleapis.com/v1beta1/projects/{project_id}/androidApps')
    app_id = next((a['appId'] for a in apps.get('apps', [])
                   if a.get('packageName') == 'com.zovexapp'), None)
    if not app_id:
        raise RuntimeError('Android app com.zovexapp not found in Firebase')
    print(f'Firebase appId: {app_id}')

    # Register SHA-1 (ignore 409 = already registered)
    try:
        api(f'https://firebase.googleapis.com/v1beta1/projects/{project_id}/androidApps/{app_id}/sha',
            data=json.dumps({'shaHash': sha1, 'certType': 'SHA_1'}).encode())
        print('SHA-1 registered with Firebase')
    except urllib.error.HTTPError as e:
        if e.code == 409:
            print('SHA-1 already registered')
        else:
            raise

    # Download the now-updated google-services.json
    cfg = api(f'https://firebase.googleapis.com/v1beta1/projects/{project_id}/androidApps/{app_id}/config')
    gs_json = base64.b64decode(cfg['configFileContents']).decode()
    open('android/app/google-services.json', 'w').write(gs_json)
    print('Updated google-services.json written from Firebase API')

except Exception as exc:
    print(f'Firebase step failed ({exc}) — falling back to static google-services.json')
    b64 = os.environ.get('GOOGLE_SERVICES_JSON_BASE64', '')
    if b64:
        open('android/app/google-services.json', 'wb').write(base64.b64decode(b64))
PYEOF

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --no-configuration-cache --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zovex-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
