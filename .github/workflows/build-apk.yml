name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p android/gradle/wrapper
          curl -fsSL -o android/gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate Keystore
        run: |
          cd android/app
          keytool -genkeypair \
            -v \
            -keystore zovex-release.keystore \
            -alias zovex-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass zovex2026 \
            -keypass zovex2026 \
            -dname "CN=Zovex,OU=Mobile,O=Zovex,L=IL,ST=IL,C=IL"

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zovex-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
